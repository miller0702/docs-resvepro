openapi: 3.0.3
info:
  title: EGW Writings API
  description: API MVP Plan Plata — lectura y gestión editorial
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1
    description: Local

tags:
  - name: Auth
  - name: Users
  - name: Roles
  - name: Library
  - name: Sync
  - name: Media
  - name: Admin
  - name: Platform
  - name: Community
  - name: Moderation
  - name: Study

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Registro de lector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        '201':
          description: Usuario creado
        '409':
          description: Email o usuario ya registrado

  /auth/login:
    post:
      tags: [Auth]
      summary: Inicio de sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Tokens JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Nuevo access token

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Solicitar recuperación de contraseña
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Restablecer contraseña
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8

  /users/me:
    get:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      summary: Perfil actual
      responses:
        '200':
          description: Perfil del usuario
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserProfile'
    patch:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      summary: Actualizar perfil
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        '200':
          description: Perfil actualizado
    delete:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      summary: Eliminar cuenta propia (anonimiza datos personales)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, confirm]
              properties:
                password:
                  type: string
                  minLength: 8
                confirm:
                  type: string
                  description: Debe ser exactamente ELIMINAR
      responses:
        '200':
          description: Cuenta eliminada

  /account/deletion-request:
    post:
      tags: [Platform]
      summary: Solicitud pública de eliminación de cuenta por email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                message:
                  type: string
      responses:
        '200':
          description: Solicitud registrada

  /users/me/avatar:
    post:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      summary: Subir foto de perfil
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar actualizado
    delete:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      summary: Eliminar foto de perfil
      responses:
        '200':
          description: Avatar eliminado

  /users/me/cover:
    post:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      summary: Subir portada de perfil
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Portada actualizada
    delete:
      tags: [Users]
      security: [{ bearerAuth: [] }]
      summary: Eliminar portada de perfil
      responses:
        '200':
          description: Portada eliminada

  /permissions:
    get:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      summary: Listar permisos asignables al panel
      responses:
        '200':
          description: Permisos disponibles para roles del panel

  /roles:
    get:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      summary: Listar roles
      responses:
        '200':
          description: Roles con permisos y conteo de usuarios
    post:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      summary: Crear rol personalizado del panel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleDto'
      responses:
        '201':
          description: Rol creado
        '409':
          description: Código duplicado

  /roles/{id}:
    get:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      summary: Detalle de rol
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Rol
        '404':
          description: No encontrado
    patch:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      summary: Actualizar rol (no aplica a roles inmutables del sistema)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleDto'
      responses:
        '200':
          description: Rol actualizado
    delete:
      tags: [Roles]
      security: [{ bearerAuth: [] }]
      summary: Eliminar rol personalizado sin usuarios asignados
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Rol eliminado

  /favorites:
    get:
      tags: [Library]
      security: [{ bearerAuth: [] }]
      summary: Favoritos agrupados (libros, audiolibros, podcasts, videos, publicaciones)
      responses:
        '200':
          description: Objeto con secciones books, audiobooks, podcasts, videos, posts
    post:
      tags: [Library]
      security: [{ bearerAuth: [] }]
      summary: Agregar favorito
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetType: { type: string, enum: [BOOK, PODCAST, VIDEO, POST] }
                targetId: { type: string }
                bookId: { type: string, format: uuid, description: 'Compatibilidad legacy → BOOK' }
      responses:
        '200':
          description: Favorito registrado

  /favorites/{targetType}/{targetId}:
    delete:
      tags: [Library]
      security: [{ bearerAuth: [] }]
      summary: Quitar favorito
      parameters:
        - name: targetType
          in: path
          required: true
          schema: { type: string, enum: [BOOK, PODCAST, VIDEO, POST] }
        - name: targetId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Favorito eliminado

  /study/book-ids:
    get:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: IDs de libros con notas o resaltados del usuario
      description: |
        Respuesta ligera para calcular el estado «estudiando» en biblioteca.
        No devuelve el contenido de notas ni resaltados; usar `/study/notes` y `/study/highlights` para eso.
      responses:
        '200':
          description: Lista de bookIds
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/StudyBookIds'

  /study/folders:
    get:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: Listar carpetas de estudio
      parameters:
        - name: parentId
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Carpetas del usuario
    post:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: Crear carpeta de estudio
      responses:
        '201':
          description: Carpeta creada

  /study/folders/{id}:
    patch:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: Actualizar carpeta
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Carpeta actualizada
    delete:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: Eliminar carpeta
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Carpeta eliminada

  /study/notes:
    get:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: Listar notas de estudio
      parameters:
        - name: folderId
          in: query
          schema: { type: string, format: uuid }
        - name: bookId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Notas del usuario
    post:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: Crear nota
      responses:
        '201':
          description: Nota creada

  /study/notes/{id}:
    patch:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: Actualizar nota
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Nota actualizada
    delete:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: Eliminar nota
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Nota eliminada

  /study/highlights:
    get:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: Listar subrayados / citas guardadas
      parameters:
        - name: bookId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Highlights del usuario
    post:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: Guardar subrayado
      responses:
        '201':
          description: Highlight creado

  /study/highlights/{id}:
    delete:
      tags: [Study]
      security: [{ bearerAuth: [] }]
      summary: Eliminar subrayado
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Highlight eliminado

  /community/posts:
    get:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Feed de la comunidad (solo seguidos, propias y oficiales)
      description: >
        Sin authorId, el feed incluye publicaciones propias, de cuentas a las que el usuario sigue
        y de perfiles oficiales. Con authorId (p. ej. perfil encontrado en búsqueda) se listan
        las publicaciones de ese autor sin exigir follow. La búsqueda de personas (/search) sigue
        siendo global.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 50 }
        - name: tag
          in: query
          schema: { type: string }
        - name: authorId
          in: query
          schema: { type: string, format: uuid }
          description: Filtrar publicaciones de un autor
        - name: since
          in: query
          schema: { type: string, format: date-time }
          description: Devuelve solo publicaciones creadas después de esta fecha (ISO8601)
      responses:
        '200':
          description: Publicaciones con autor, etiquetas y reacciones
    post:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Crear recomendación (texto, imágenes, etiquetas y menciones)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, maxLength: 2000 }
                kind: { type: string, enum: [GENERAL, RECOMMENDATION, QUOTE] }
                bookId: { type: string, format: uuid }
                videoId: { type: string, format: uuid }
                podcastSeriesId: { type: string, format: uuid }
                chapterId: { type: string, format: uuid }
                quoteExcerpt: { type: string, maxLength: 2000 }
                tags:
                  type: array
                  maxItems: 10
                  items: { type: string, maxLength: 40 }
                imageIds:
                  type: array
                  maxItems: 4
                  items: { type: string, format: uuid }
                mentionIds:
                  type: array
                  maxItems: 10
                  items: { type: string, format: uuid }
      responses:
        '201':
          description: Publicación creada

  /community/images:
    post:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Subir imagen para publicación (máx. 2 MB, JPG/PNG/WebP)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '201':
          description: Imagen subida; devuelve id y url

  /community/mention-users:
    get:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Buscar seguidores/amigos para mencionar con @
      parameters:
        - name: q
          in: query
          schema: { type: string, maxLength: 50 }
      responses:
        '200':
          description: Usuarios del círculo social (seguidos o seguidores)

  /community/users/{userId}:
    get:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Perfil público de un usuario de la comunidad
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Perfil con contadores y estado de seguimiento
        '404':
          description: Usuario no encontrado

  /community/follow/{userId}:
    post:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Seguir a un usuario
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Seguimiento registrado
    delete:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Dejar de seguir a un usuario
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Seguimiento eliminado

  /community/posts/{id}:
    get:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Obtener una publicación por id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Publicación con autor, imágenes, menciones y repost anidado si aplica
        '404':
          description: Publicación no encontrada
    delete:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Eliminar publicación propia
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Publicación eliminada

  /community/posts/{id}/like:
    post:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Alternar reacción Amén (compatibilidad legacy)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Contadores de reacción actualizados

  /community/posts/{id}/reactions:
    post:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Alternar reacción (AMEN, INSPIRED, INSIGHT, PRAY, READ)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [AMEN, INSPIRED, INSIGHT, PRAY, READ]
      responses:
        '200':
          description: Devuelve myReaction y reactionCounts
    get:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Listar usuarios que reaccionaron a la publicación
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Lista de reacciones con usuario y tipo

  /community/posts/{id}/repost:
    post:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Repostear publicación en el feed del usuario
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                  maxLength: 500
                  description: Comentario opcional al repostear
      responses:
        '201':
          description: Nueva publicación repost creada

  /community/posts/{id}/comments:
    get:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Comentarios de una publicación
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Lista de comentarios
    post:
      tags: [Community]
      security: [{ bearerAuth: [] }]
      summary: Agregar comentario
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, maxLength: 1000 }
                parentId:
                  type: string
                  description: ID del comentario padre (respuesta en hilo)
      responses:
        '201':
          description: Comentario creado

  /moderation/reports:
    post:
      tags: [Moderation]
      security: [{ bearerAuth: [] }]
      summary: Reportar publicación, usuario, comentario o imagen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetType, targetId, reason]
              properties:
                targetType:
                  type: string
                  enum: [POST, USER, COMMENT, POST_IMAGE]
                targetId: { type: string }
                reason:
                  type: string
                  enum: [SPAM, HARASSMENT, HATE_SPEECH, VIOLENCE, NUDITY, MISINFORMATION, IMPERSONATION, OTHER]
                details: { type: string, maxLength: 1000 }
                contextUrl: { type: string, maxLength: 500 }
      responses:
        '201':
          description: Reporte registrado
        '409':
          description: Ya existe un reporte del mismo usuario sobre el mismo objetivo

  /admin/moderation/reports:
    get:
      tags: [Admin, Moderation]
      security: [{ bearerAuth: [] }]
      summary: Listar reportes de moderación (admin)
      description: >
        Incluye el campo `target` con el contenido reportado (texto/autor/imágenes de la publicación,
        comentario, usuario o URL de imagen) para revisarlo en el panel.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, IN_REVIEW, RESOLVED, DISMISSED]
      responses:
        '200':
          description: Lista paginada de reportes

  /admin/moderation/reports/{id}:
    patch:
      tags: [Admin, Moderation]
      security: [{ bearerAuth: [] }]
      summary: Actualizar estado de un reporte (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [PENDING, IN_REVIEW, RESOLVED, DISMISSED]
                adminNotes: { type: string, maxLength: 2000 }
      responses:
        '200':
          description: Reporte actualizado

  /search:
    get:
      tags: [Search]
      security: [{ bearerAuth: [] }]
      summary: Búsqueda global (personas, publicaciones, libros, videos, audios)
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 2, maxLength: 80 }
        - name: tab
          in: query
          schema:
            type: string
            enum: [all, people, posts, books, videos, audios]
            default: all
        - name: scope
          in: query
          schema:
            type: string
            enum: [all, books, videos, audios]
            default: all
          description: Limita la búsqueda a una sección (libros, videos, audios)
      responses:
        '200':
          description: Resultados agrupados por categoría con conteos

  /books:
    get:
      tags: [Library]
      security: [{ bearerAuth: [] }]
      summary: Catálogo de libros (listado ligero)
      description: |
        Metadatos para cards y listas. No incluye capítulos ni el blob inline de `media_assets.data`.
        Para detalle y lector usar `GET /books/{id}`.
        Para varios libros conocidos (p. ej. pestaña «Leyendo») usar `ids` en lugar de N llamadas al detalle.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: search
          in: query
          schema: { type: string }
        - name: categoryId
          in: query
          schema: { type: string, format: uuid }
        - name: collectionId
          in: query
          schema: { type: string, format: uuid }
        - name: excludeCategorySlug
          in: query
          schema: { type: string }
          description: Excluir libros de una categoría por slug (ej. biblia)
        - name: isAudiobook
          in: query
          schema: { type: boolean }
          description: Filtrar solo audiolibros
        - name: ids
          in: query
          schema: { type: string }
          description: IDs de libros separados por coma (máx. 100) para carga por lote
      responses:
        '200':
          description: Lista paginada de libros (metadatos ligeros)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookList'
    post:
      tags: [Library]
      security: [{ bearerAuth: [] }]
      summary: Crear libro (admin)
      responses:
        '201':
          description: Libro creado

  /books/{id}:
    get:
      tags: [Library]
      security: [{ bearerAuth: [] }]
      summary: Detalle de libro con capítulos
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Libro
        '404':
          description: No encontrado
    patch:
      tags: [Library]
      security: [{ bearerAuth: [] }]
      summary: Actualizar libro (admin, books:write)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
