components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterDto:
      type: object
      required: [username, email, password, firstName, lastName, acceptTerms]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[a-zA-Z0-9_]+$'
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        firstName: { type: string, minLength: 2 }
        lastName: { type: string, minLength: 2 }
        acceptTerms:
          type: boolean
          enum: [true]

    LoginDto:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          description: Correo electrónico o nombre de usuario
        password: { type: string }

    AuthResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: string }
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string, format: email }
        firstName: { type: string }
        lastName: { type: string }
        avatarId: { type: string, format: uuid, nullable: true }
        avatarUrl: { type: string, nullable: true }
        coverId: { type: string, format: uuid, nullable: true }
        coverUrl: { type: string, nullable: true }
        roles:
          type: array
          items: { type: string }
        canPost: { type: boolean }
        isActive: { type: boolean }
      type: object
      required: [code, name, permissions]
      properties:
        code:
          type: string
          pattern: '^[A-Z][A-Z0-9_]*$'
          example: EDITOR_LIBROS
        name:
          type: string
          example: Editor de libros
        description:
          type: string
        permissions:
          type: array
          minItems: 1
          items: { type: string }
          example: [books:read, books:write, media:upload]

    UpdateRoleDto:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        permissions:
          type: array
          minItems: 1
          items: { type: string }

    SyncPushDto:
      type: object
      properties:
        bookmarks:
          type: array
          items:
            type: object
            properties:
              bookId: { type: string }
              chapterId: { type: string }
              position: { type: number }
              note: { type: string }
              updatedAt: { type: string, format: date-time }
        progress:
          type: array
          items:
            type: object
            properties:
              bookId: { type: string }
              chapterId: { type: string }
              percentage: { type: number }
              updatedAt: { type: string, format: date-time }

    StudyBookIds:
      type: object
      required: [bookIds]
      properties:
        bookIds:
          type: array
          items: { type: string, format: uuid }
          description: Libros con al menos una nota o resaltado del usuario

    BookListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        slug: { type: string }
        summary: { type: string, nullable: true }
        isPublished: { type: boolean }
        isAudiobook: { type: boolean }
        author:
          type: object
          nullable: true
          properties:
